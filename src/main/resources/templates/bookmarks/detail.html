<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title th:text="${bookmark.title}">북마크 상세</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .meta { color: #888; font-size: 13px; margin-bottom: 24px; }
        .info { margin-bottom: 16px; line-height: 1.7; }
        .info-label { font-weight: bold; color: #333; }
        .description { line-height: 1.7; white-space: pre-wrap; }
        .actions { display: flex; gap: 10px; margin-top: 40px; }
        .btn { padding: 8px 20px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .btn-pin { padding: 8px 20px; background: #e6a800; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-danger { padding: 8px 20px; background: #cc2200; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-back { padding: 8px 20px; background: #888; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .pin-badge { color: #e6a800; font-weight: bold; }
        .category-badge { display: inline-block; padding: 2px 8px; background: #eee; border-radius: 10px; font-size: 12px; color: #555; }
    </style>
</head>
<body>
<h1>
    <span class="pin-badge" th:if="${bookmark.pinned}">&#9733; </span>
    <span th:text="${bookmark.title}"></span>
</h1>

<div class="meta">
    작성일: <span th:text="${#temporals.format(bookmark.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
    &nbsp;|&nbsp;
    수정일: <span th:text="${#temporals.format(bookmark.updatedAt, 'yyyy-MM-dd HH:mm')}"></span>
</div>

<div class="info">
    <span class="info-label">URL: </span>
    <a th:href="${bookmark.url}" th:text="${bookmark.url}" target="_blank" rel="noopener noreferrer"></a>
</div>

<div class="info">
    <span class="info-label">카테고리: </span>
    <span class="category-badge" th:text="${bookmark.category}"></span>
</div>

<div class="info" th:if="${bookmark.description != null and !bookmark.description.isBlank()}">
    <span class="info-label">설명</span>
    <div class="description" th:text="${bookmark.description}"></div>
</div>

<div class="actions">
    <a class="btn" th:href="@{/bookmarks/{id}/edit(id=${bookmark.id})}">수정</a>
    <form th:action="@{/bookmarks/{id}/pin(id=${bookmark.id})}" method="post" style="margin:0">
        <button type="submit" class="btn-pin"
                th:text="${bookmark.pinned ? '고정 해제' : '고정'}"></button>
    </form>
    <form th:action="@{/bookmarks/{id}/delete(id=${bookmark.id})}" method="post" style="margin:0"
          onsubmit="return confirm('정말 삭제하시겠습니까?')">
        <button type="submit" class="btn-danger">삭제</button>
    </form>
    <a class="btn-back" th:href="@{/bookmarks}">목록</a>
</div>
</body>
</html>
