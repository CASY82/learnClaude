<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>게시글 수정</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; }
        input[type=text], textarea {
            width: 100%; padding: 8px; box-sizing: border-box;
            border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
        }
        textarea { height: 200px; resize: vertical; }
        .error { color: red; font-size: 13px; margin-top: 4px; }
        .btn { padding: 8px 20px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-cancel { padding: 8px 20px; background: #888; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>
<h1>게시글 수정</h1>

<form th:action="@{/posts/{id}/edit(id=${post.id})}" th:object="${request}" method="post">
    <div class="form-group">
        <label for="title">제목</label>
        <input type="text" id="title" th:field="*{title}" placeholder="제목을 입력하세요">
        <p class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
    </div>
    <div class="form-group">
        <label for="content">내용</label>
        <textarea id="content" th:field="*{content}" placeholder="내용을 입력하세요"></textarea>
        <p class="error" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></p>
    </div>
    <div class="actions">
        <button type="submit" class="btn">저장</button>
        <a class="btn-cancel" th:href="@{/posts/{id}(id=${post.id})}">취소</a>
    </div>
</form>
</body>
</html>
