<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>할일 목록</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
        .add-form { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-form input[type=text] {
            flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;
        }
        .add-form button {
            padding: 8px 20px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
        .error { color: red; font-size: 13px; margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; }
        .completed { text-decoration: line-through; color: #999; }
        .actions { display: flex; gap: 6px; }
        .btn-toggle {
            padding: 4px 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        .btn-toggle.done { background: #888; }
        .btn-delete {
            padding: 4px 12px; background: #cc2200; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px;
        }
        .empty { color: #888; margin-top: 20px; }
    </style>
</head>
<body>
<h1>할일 목록</h1>

<form th:action="@{/todos}" th:object="${request}" method="post" class="add-form">
    <input type="text" th:field="*{title}" placeholder="할일을 입력하세요">
    <button type="submit">추가</button>
    <p class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
</form>

<table th:if="${not #lists.isEmpty(todos)}">
    <thead>
    <tr>
        <th>#</th>
        <th>할일</th>
        <th>상태</th>
        <th>작성일</th>
        <th>관리</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todos}">
        <td th:text="${todo.id}"></td>
        <td th:classappend="${todo.completed} ? 'completed'" th:text="${todo.title}"></td>
        <td th:text="${todo.completed} ? '완료' : '미완료'"></td>
        <td th:text="${#temporals.format(todo.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
        <td class="actions">
            <form th:action="@{/todos/{id}/toggle(id=${todo.id})}" method="post" style="margin:0">
                <button type="submit" class="btn-toggle" th:classappend="${todo.completed} ? 'done'"
                        th:text="${todo.completed} ? '되돌리기' : '완료'"></button>
            </form>
            <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post" style="margin:0"
                  onsubmit="return confirm('정말 삭제하시겠습니까?')">
                <button type="submit" class="btn-delete">삭제</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>

<p class="empty" th:if="${#lists.isEmpty(todos)}">등록된 할일이 없습니다.</p>
</body>
</html>
